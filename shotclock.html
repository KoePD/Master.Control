<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { 
            background: transparent; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            font-family: sans-serif;
        }

        #clock-container {
            position: relative;
            width: 85vmin; 
            height: 85vmin;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #timer {
            font-size: 45vmin; 
            font-weight: 900;
            color: white;
            z-index: 10;
            text-shadow: 4px 4px 15px rgba(0,0,0,0.8);
        }

        svg {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        circle {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
        }

        .bg-ring { stroke: rgba(255,255,255,0.1); }
        .progress-ring {
            stroke: #00FF41;
            transition: stroke 0.3s, stroke-dashoffset 0.1s linear;
        }

        .warning { stroke: #ffcc00 !important; }
        .critical { stroke: #ff0000 !important; }
        .critical-text { color: #ff0000 !important; }
    </style>
</head>
<body>

    <div id="clock-container">
        <svg viewBox="0 0 200 200">
            <circle class="bg-ring" cx="100" cy="100" r="90"></circle>
            <circle id="progress" class="progress-ring" cx="100" cy="100" r="90"></circle>
        </svg>
        <div id="timer">30</div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://pool-balls-60509-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const timerEl = document.getElementById('timer');
        const progressEl = document.getElementById('progress');
        const radius = 90;
        const circumference = 2 * Math.PI * radius;
        
        progressEl.style.strokeDasharray = circumference;

        function setProgress(percent) {
            const offset = circumference - (percent / 100) * circumference;
            progressEl.style.strokeDashoffset = offset;
        }

        db.ref('shotclock').on('value', snap => {
            const data = snap.val();
            if (!data) return;

            const timeLeft = Math.max(0, Math.ceil(data.currentTime || 0));
            const maxTime = data.maxTime || 30;
            const percent = (timeLeft / maxTime) * 100;

            timerEl.innerText = timeLeft;
            setProgress(percent);

            timerEl.classList.remove('critical-text');
            progressEl.classList.remove('warning', 'critical');

            if (timeLeft <= 5) {
                progressEl.classList.add('critical');
                timerEl.classList.add('critical-text');
            } else if (timeLeft <= 10) {
                progressEl.classList.add('warning');
            }
        });
    </script>
</body>
</html>
