<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>KØ-PÅDD Shotclock Display Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { 
            background: transparent; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        #clock-container {
            position: relative;
            width: 85vmin; 
            height: 85vmin;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #timer {
            font-size: 45vmin; 
            font-weight: 900;
            color: white;
            z-index: 10;
            text-shadow: 4px 4px 20px rgba(0,0,0,0.8);
        }

        svg {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        circle {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
        }

        .bg-ring { stroke: rgba(255,255,255,0.1); }
        
        .progress-ring {
            stroke: #00FF41;
            transition: stroke 0.3s, stroke-dashoffset 0.1s linear;
        }

        .warning { stroke: #ffcc00 !important; }
        .critical { stroke: #ff0000 !important; }
        .critical-text { color: #ff0000 !important; }
    </style>
</head>
<body>

    <div id="clock-container">
        <svg viewBox="0 0 200 200">
            <circle class="bg-ring" cx="100" cy="100" r="90"></circle>
            <circle id="progress" class="progress-ring" cx="100" cy="100" r="90"></circle>
        </svg>
        <div id="timer">30</div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://pool-balls-60509-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const timerEl = document.getElementById('timer');
        const progressEl = document.getElementById('progress');
        const radius = 90;
        const circumference = 2 * Math.PI * radius;
        
        progressEl.style.strokeDasharray = circumference;

        let timeLeft = 30;
        let maxTime = 30;
        let isRunning = false;
        let timerInterval = null;

        function updateUI() {
            const displayTime = Math.ceil(timeLeft);
            timerEl.innerText = displayTime;
            
            const percent = (timeLeft / maxTime) * 100;
            const offset = circumference - (percent / 100) * circumference;
            progressEl.style.strokeDashoffset = offset;

            // Farger
            timerEl.classList.remove('critical-text');
            progressEl.classList.remove('warning', 'critical');
            if (timeLeft <= 5.5) {
                progressEl.classList.add('critical');
                timerEl.classList.add('critical-text');
            } else if (timeLeft <= 10.5) {
                progressEl.classList.add('warning');
            }
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            isRunning = true;
            db.ref('shotclock/status').set('running');
            
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft -= 0.1;
                    updateUI();
                    // Synkroniser med Firebase hvert sekund (valgfritt, men bra for andre klienter)
                    if (Math.abs(timeLeft % 1 === 0)) {
                        db.ref('shotclock/currentTime').set(timeLeft);
                    }
                } else {
                    stopTimer();
                }
            }, 100);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            db.ref('shotclock/status').set('paused');
        }

        // Lytt på kommandoer fra Master Control
        db.ref('shotclock/cmd').on('value', snap => {
            const cmd = snap.val();
            if (!cmd) return;

            switch(cmd.action) {
                case 'reset30':
                    timeLeft = 30; maxTime = 30;
                    updateUI(); startTimer();
                    break;
                case 'reset60':
                    timeLeft = 60; maxTime = 60;
                    updateUI(); startTimer();
                    break;
                case 'extension':
                    timeLeft += 30; maxTime = Math.max(maxTime, timeLeft);
                    updateUI();
                    break;
                case 'toggle':
                    if (isRunning) stopTimer(); else startTimer();
                    break;
                case 'plus':
                    timeLeft += 1; updateUI();
                    break;
                case 'minus':
                    timeLeft = Math.max(0, timeLeft - 1); updateUI();
                    break;
            }
            // Slett kommandoen så den ikke kjører på nytt ved refresh
            db.ref('shotclock/cmd').set(null);
        });

        updateUI();
    </script>
</body>
</html>
