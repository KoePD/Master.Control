<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>KØ-PÅDD Shotclock Display</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { 
            background: transparent; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace; /* Monospace hindrer tallene i å hoppe */
        }

        #clock-container {
            position: relative;
            /* Denne skalerer basert på skjermstørrelsen (viewport min) */
            width: 80vmin; 
            height: 80vmin;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            border: 10px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* Selve tallet */
        #timer {
            font-size: 40vmin; /* Gigantisk font som følger sirkelen */
            font-weight: 900;
            color: white;
            z-index: 10;
            text-shadow: 0 0 20px rgba(0,0,0,1);
        }

        /* Progress ring som fylles/tømmes */
        svg {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        circle {
            fill: none;
            stroke-width: 15;
            stroke-linecap: round;
            transition: stroke 0.3s, stroke-dashoffset 0.1s linear;
        }

        .bg-ring { stroke: #222; }
        .progress-ring {
            stroke: #00FF41;
            stroke-dasharray: 1000; /* Blir satt i JS */
            stroke-dashoffset: 0;
        }

        /* Fargeendring ved lav tid */
        .warning { stroke: #ffcc00 !important; }
        .critical { stroke: #ff0000 !important; }
        .critical-text { color: #ff0000 !important; }
    </style>
</head>
<body>

    <div id="clock-container">
        <svg viewBox="0 0 200 200">
            <circle class="bg-ring" cx="100" cy="100" r="90"></circle>
            <circle id="progress" class="progress-ring" cx="100" cy="100" r="90"></circle>
        </svg>
        <div id="timer">30</div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://pool-balls-60509-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const timerEl = document.getElementById('timer');
        const progressEl = document.getElementById('progress');
        const radius = 90;
        const circumference = 2 * Math.PI * radius;
        
        progressEl.style.strokeDasharray = circumference;

        function setProgress(percent) {
            const offset = circumference - (percent / 100) * circumference;
            progressEl.style.strokeDashoffset = offset;
        }

        // Lytt på klokke-data fra Firebase
        db.ref('shotclock').on('value', snap => {
            const data = snap.val();
            if (!data) return;

            const timeLeft = Math.max(0, Math.ceil(data.currentTime || 0));
            const maxTime = data.maxTime || 30;
            const percent = (timeLeft / maxTime) * 100;

            timerEl.innerText = timeLeft;
            setProgress(percent);

            // Farge-feedback
            timerEl.classList.remove('critical-text');
            progressEl.classList.remove('warning', 'critical');

            if (timeLeft <= 5) {
                progressEl.classList.add('critical');
                timerEl.classList.add('critical-text');
            } else if (timeLeft <= 10) {
                progressEl.classList.add('warning');
            }
        });
    </script>
</body>
</html>
