<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>KØ-PÅDD Scoreboard Piler</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { 
            background: transparent; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        #arrow-container { 
            position: relative; 
            width: 100%; 
            height: 100%;
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 60px; /* Juster denne for avstand til tallene */
            pointer-events: none;
        }
        
        .arrow-shape { 
            width: 0; 
            height: 0; 
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
            opacity: 0;
            /* VIKTIG: Ingen transition her betyr at den forsvinner instant */
            transition: none; 
        }

        #arrowL {
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-right: 20px solid #FFFFFF;
        }
        
        #arrowR {
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 20px solid #FFFFFF;
        }
        
        /* Transition her gjelder KUN når pilen blir aktiv (fades inn) */
        .active { 
            opacity: 1 !important; 
            transition: opacity 0.2s ease-in-out !important;
            /* Vi fjerner transform/glidning helt for en renere look */
        }
    </style>
</head>
<body>

    <div id="arrow-container">
        <div id="arrowL" class="arrow-shape"></div>
        <div id="arrowR" class="arrow-shape"></div>
    </div>

    <script>
        const firebaseConfig = { 
            databaseURL: "https://pool-balls-60509-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('activePlayer').on('value', snap => {
            const pos = snap.val();
            document.getElementById('arrowL').classList.toggle('active', pos === 'left');
            document.getElementById('arrowR').classList.toggle('active', pos === 'right');
        });
    </script>
</body>
</html>
