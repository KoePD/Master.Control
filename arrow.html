<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>KØ-PÅDD Spiller-pil Instant Out</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { 
            background: transparent; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        #arrow-container { 
            position: relative; 
            width: 850px; 
            display: flex; 
            justify-content: space-between; 
            pointer-events: none;
        }
        
        .arrow-shape { 
            width: 0; 
            height: 0; 
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.9));
            /* Når pilen går BORT: Ingen animasjon (0s) */
            opacity: 0;
            transition: none; 
        }

        /* Venstre pil - peker mot VENSTRE */
        #arrowL {
            border-top: 25px solid transparent;
            border-bottom: 25px solid transparent;
            border-right: 40px solid #FFFFFF;
        }
        
        /* Høyre pil - peker mot HØYRE */
        #arrowR {
            border-top: 25px solid transparent;
            border-bottom: 25px solid transparent;
            border-left: 40px solid #FFFFFF;
        }
        
        /* Når pilen blir AKTIV: Animer inn */
        .active { 
            opacity: 1 !important; 
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out !important;
        }

        /* Spesifikk glide-inn-startposisjon for aktiv tilstand */
        #arrowL.active { transform: translateX(-15px); }
        #arrowR.active { transform: translateX(15px); }
    </style>
</head>
<body>

    <div id="arrow-container">
        <div id="arrowL" class="arrow-shape"></div>
        <div id="arrowR" class="arrow-shape"></div>
    </div>

    <script>
        const firebaseConfig = { 
            databaseURL: "https://pool-balls-60509-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('activePlayer').on('value', snap => {
            const pos = snap.val();
            document.getElementById('arrowL').classList.toggle('active', pos === 'left');
            document.getElementById('arrowR').classList.toggle('active', pos === 'right');
        });
    </script>
</body>
</html>
