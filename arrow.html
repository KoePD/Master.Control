<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>KØ-PÅDD Spiller-pil</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { 
            background: transparent; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        #arrow-container { 
            position: relative; 
            /* JUSTER denne bredden (f.eks. 700px eller 900px) for å treffe under navnene i OBS */
            width: 800px; 
            display: flex; 
            justify-content: space-between; 
            pointer-events: none;
        }
        
        /* Her tegner vi trekanten med ren CSS istedenfor tekst */
        .arrow-shape { 
            width: 0; 
            height: 0; 
            border-left: 30px solid transparent;  /* Bredde venstre */
            border-right: 30px solid transparent; /* Bredde høyre */
            border-bottom: 50px solid #FFFFFF;    /* Høyde og farge (Hvit) */
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.9));
            opacity: 0;
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
            transform: translateY(20px); /* Starter litt lavere */
        }
        
        /* Når pilen er aktiv, fader den inn og flytter seg opp */
        .active { 
            opacity: 1; 
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div id="arrow-container">
        <div id="arrowL" class="arrow-shape"></div>
        <div id="arrowR" class="arrow-shape"></div>
    </div>

    <script>
        const firebaseConfig = { 
            databaseURL: "https://pool-balls-60509-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('activePlayer').on('value', snap => {
            const pos = snap.val();
            document.getElementById('arrowL').classList.toggle('active', pos === 'left');
            document.getElementById('arrowR').classList.toggle('active', pos === 'right');
        });
    </script>
</body>
</html>
