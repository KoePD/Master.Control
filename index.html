<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KØ-PÅDD Master Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #000; --card: #0d0d0d; --border: #222;
            --accent: #ffcc00; --green: #00FF41; --blue: #0055ff;
            --red: #FF0000; --ext: #00E5FF;
        }
        
        body { 
            background: var(--bg); color: white; font-family: sans-serif;
            margin: 0; padding: 10px; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 16px;
            padding: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h2 { font-size: 0.8rem; color: var(--accent); text-align: center; margin: 0 0 12px 0; text-transform: uppercase; letter-spacing: 1px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full { grid-column: span 2; }
        
        button {
            padding: 15px 5px; font-size: 14px; font-weight: 800; border-radius: 10px;
            border: 2px solid #333; background: #111; color: white; text-transform: uppercase;
        }
        button:active { transform: scale(0.95); background: #222; }

        .player-btn { padding: 22px 5px; font-size: 15px; border-width: 3px; line-height: 1.2; }
        .active-l, .active-r { border-color: var(--green) !important; color: var(--green) !important; background: rgba(0, 255, 65, 0.05) !important; }

        /* KULER SEKSJON */
        .ball-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            justify-items: center; 
            margin-bottom: 15px; 
        }
        
        .ball-btn { 
            width: 68px; height: 68px; 
            min-width: 68px; min-height: 68px; 
            border-radius: 50%; border: 2px solid #000; 
            position: relative; overflow: hidden;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 0;
            box-sizing: border-box;
        }
        
        /* HER ER ENDRINGENE FOR STØRRE SIRKLER */
        .num-label { 
            background: white; color: black; 
            width: 26px; height: 26px; /* Økt fra 20px */
            border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 14px; font-weight: 900; /* Økt fra 11px */
            border: 1px solid black;
            position: relative;
            z-index: 10; /* Økt for å ligge over stripen */
            margin: 0;
            box-sizing: border-box;
            flex-shrink: 0; /* Hindrer sirkelen i å bli trykket flat */
        }
        
        .sunk { opacity: 0.15; filter: grayscale(1); transform: scale(0.9); }
        .striped { background: black !important; }
        .stripe-band { position: absolute; width: 100%; height: 32px; top: 18px; z-index: 1; }
        
        /* Farger */
        .f-1, .b9 { background-color: #ffcc00; } .f-2, .b10 { background-color: #0055aa; }
        .f-3, .b11 { background-color: #cc0000; } .f-4, .b12 { background-color: #ff66aa; }
        .f-5, .b13 { background-color: #663399; } .f-6, .b14 { background-color: #007744; }
        .f-7, .b15 { background-color: #884422; } .f-8 { background-color: black; }

        .btn-ext { border-color: var(--ext); color: var(--ext); padding: 18px 5px; }
        #toggleBtn.running { border-color: var(--red); color: var(--red); }
        #toggleBtn.paused { border-color: var(--green); color: var(--green); }
        .mini-btn { padding: 10px 2px; font-size: 11px; }

        .settings { font-size: 10px; color: #444; text-align: center; margin-top: 8px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div class="section">
        <h2>Pool Control</h2>
        <div class="ball-grid" id="ball-grid"></div>
        <div class="grid" style="gap: 8px;">
            <button class="mini-btn" onclick="reputtActiveBalls()">♻️ Re-Rack</button>
            <button class="mini-btn" onclick="resetPool(9)">9-Ball</button>
            <button class="mini-btn" onclick="resetPool(10)">10-Ball</button>
            <button class="mini-btn" onclick="resetPool(15)">8-Ball</button>
        </div>
    </div>

    <div class="section">
        <h2>Shotclock</h2>
        <div class="grid">
            <button id="btnL" class="player-btn" onclick="shotReset('left')">◀ SPILLER 1<br><small>RESET 30s</small></button>
            <button id="btnR" class="player-btn" onclick="shotReset('right')">SPILLER 2 ▶<br><small>RESET 30s</small></button>
            <button class="full btn-ext" onclick="sendClock('extension')">+ BRUK EXTENSION</button>
            <button id="toggleBtn" class="paused" onclick="sendClock('toggle')">▶ START / PAUSE</button>
            <button onclick="sendClock('reset60')">⚡ 60s BREAK</button>
            <button class="mini-btn" onclick="sendClock('minus')">-1s</button>
            <button class="mini-btn" onclick="sendClock('plus')">+1s</button>
        </div>
        <div class="settings">
            <input type="checkbox" id="autoStart" checked> Auto-start ved reset
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://pool-balls-60509-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function shotReset(player) {
        db.ref('activePlayer').set(player);
        db.ref('shotclock/cmd').set({ action: 'reset30', ts: Date.now() });
    }

    function sendClock(cmd) {
        db.ref('shotclock/cmd').set({ action: cmd, ts: Date.now() });
    }

    db.ref('activePlayer').on('value', snap => {
        const p = snap.val();
        document.getElementById('btnL').classList.toggle('active-l', p === 'left');
        document.getElementById('btnR').classList.toggle('active-r', p === 'right');
    });

    db.ref('shotclock/status').on('value', snap => {
        const status = snap.val();
        const btn = document.getElementById('toggleBtn');
        btn.textContent = (status === 'running') ? "⏸ PAUSE" : "▶ START / RESUME";
        btn.className = (status === 'running') ? "running" : "paused";
    });

    const grid = document.getElementById('ball-grid');
    for (let i = 1; i <= 15; i++) {
        const b = document.createElement('div');
        b.id = `btn-${i}`; b.className = 'ball-btn';
        let cIdx = i > 8 ? i - 8 : i;
        
        let num = document.createElement('div');
        num.className = 'num-label'; num.innerText = i;
        b.appendChild(num);

        if (i > 8) {
            b.classList.add('striped');
            let band = document.createElement('div');
            band.className = `stripe-band f-${cIdx}`;
            b.appendChild(band);
        } else b.classList.add(`f-${cIdx}`);
        
        b.onclick = () => {
            const ref = db.ref(`balls/${i}`);
            ref.once('value').then(s => ref.set(s.val() === false));
        };
        grid.appendChild(b);
    }

    db.ref('balls').on('value', snap => {
        const data = snap.val() || {};
        window.currentActiveData = data;
        for (let i = 1; i <= 15; i++) {
            const btn = document.getElementById(`btn-${i}`);
            if (btn) {
                btn.classList.toggle('sunk', data[i] === false);
                btn.style.display = (data[i] === undefined) ? 'none' : 'flex';
            }
        }
    });

    function resetPool(max) {
        let updates = {};
        for (let i = 1; i <= 15; i++) updates[i] = (i <= max) ? true : null;
        db.ref('balls').set(updates);
    }

    function reputtActiveBalls() {
        if (!window.currentActiveData) return;
        let updates = {};
        for (let i = 1; i <= 15; i++) {
            if (window.currentActiveData[i] !== undefined) updates[i] = true;
        }
        db.ref('balls').update(updates);
    }
</script>
</body>
</html>
