<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KØ-PÅDD Kontrollpanel Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #000; --card: #0d0d0d; --border: #222;
            --accent: #ffcc00; --green: #00FF41; --blue: #00E5FF;
            --red: #FF0000; --ext: #00E5FF;
        }
        html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 8px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; height: 100%; display: flex; flex-direction: column; gap: 8px; }
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 12px; display: flex; flex-direction: column; }
        .pool-section { flex: 1; min-height: 0; } 
        h2 { font-size: 0.65rem; color: var(--accent); text-align: center; margin: 0 0 8px 0; text-transform: uppercase; opacity: 0.7; letter-spacing: 1px; }
        
        .name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 5px; }
        .name-input { 
            background: #111; border: 1px solid #333; color: white; padding: 8px 4px; 
            border-radius: 8px; text-align: center; font-size: 11px; width: 100%; 
            box-sizing: border-box; outline: none; 
        }
        #matchIDInput { border-bottom: 1px solid var(--accent); color: var(--accent); font-weight: bold; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 12px 5px; font-size: 13px; font-weight: 800; border-radius: 10px; border: 2px solid #333; background: #111; color: white; text-transform: uppercase; transition: all 0.2s ease; }
        .player-btn { padding: 14px 5px; font-size: 13px; border-width: 2px; }
        .foul-btn { border-color: #440000; color: #ff4444; font-size: 11px; padding: 8px; }
        
        .active-l { border-color: var(--green) !important; color: var(--green) !important; background: rgba(0, 255, 65, 0.05) !important; }
        .active-r { border-color: var(--blue) !important; color: var(--blue) !important; background: rgba(0, 229, 255, 0.05) !important; }
        .mode-btn.active-mode { border-color: var(--green) !important; color: var(--green) !important; box-shadow: 0 0 8px rgba(0, 255, 65, 0.3); }

        .ball-scroll-area { flex: 1; overflow-y: auto; margin-bottom: 8px; }
        .ball-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; justify-items: center; }
        .ball-btn { width: 52px; height: 52px; border-radius: 50%; border: 2px solid #000; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; background: white; }
        .num-label { background: white; color: black; width: 18px; height: 18px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 10px; font-weight: 900; border: 1px solid black; z-index: 10; }
        .sunk { opacity: 0.15; filter: grayscale(1); transform: scale(0.9); }
        
        .stripe-band { position: absolute; width: 100%; height: 24px; top: 14px; z-index: 1; }
        .f-1, .b9 { background-color: #ffcc00; } .f-2, .b10 { background-color: #0055aa; }
        .f-3, .b11 { background-color: #cc0000; } .f-4, .b12 { background-color: #ff66aa; }
        .f-5, .b13 { background-color: #663399; } .f-6, .b14 { background-color: #007744; }
        .f-7, .b15 { background-color: #884422; } .f-8 { background-color: black; }
    </style>
</head>
<body>
<div class="container">
    <div class="section" style="padding: 10px 5px;">
        <h2>CueScore Table ID</h2>
        <div style="padding: 0 5px; margin-bottom: 8px;">
            <input type="text" id="matchIDInput" class="name-input" placeholder="Lim inn Match ID (f.eks. 79253032)" oninput="updateMatchID()">
        </div>
    </div>

    <div class="section pool-section">
        <h2>Pool Control</h2>
        <div class="ball-scroll-area">
            <div class="ball-grid" id="ball-grid"></div>
        </div>
        <div class="grid" style="gap: 5px; grid-template-columns: 1fr 1fr 1fr 1fr 1fr;">
            <button onclick="reputtActiveBalls()">♻️</button>
            <button onclick="toggleBallSet()">🎨</button>
            <button id="mode-9" class="mode-btn" onclick="resetPool(9)">9</button>
            <button id="mode-10" class="mode-btn" onclick="resetPool(10)">10</button>
            <button id="mode-8" class="mode-btn" onclick="resetPool(8)">8</button>
        </div>
    </div>

    <div class="section">
        <h2>Match & Stats</h2>
        <div class="grid">
            <button style="background:#1b5e20;" onclick="startMatch()">🟢 START</button>
            <button style="background:#b71c1c;" onclick="avsluttMatch()">🔴 STOPP</button>
            
            <button id="btnL" class="player-btn" onclick="shotReset('left')">◀ S1</button>
            <button id="btnR" class="player-btn" onclick="shotReset('right')">S2 ▶</button>
            
            <button class="foul-btn" onclick="addFoul('left')">⚠ FOUL S1</button>
            <button class="foul-btn" onclick="addFoul('right')">⚠ FOUL S2</button>

            <button id="toggleBtn" onclick="sendClock('toggle')">▶ START/PAUSE</button>
            <button style="border-color: var(--accent);" onclick="startBreak()">⚡ 60s BREAK</button>
            
            <button style="grid-column: span 2; color: var(--ext); border-color: var(--ext);" onclick="useExtension()">+ BRUK EXTENSION</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://pool-balls-60509-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let lastResetTime = Date.now();
    let currentVisitPots = 0;
    let ballStyle = 'classic'; 
    let currentGameMode = 9;

    function vibe(ms = 40) { if (navigator.vibrate) navigator.vibrate(ms); }

   // --- KORRIGERT CUESCORE DATA HENTING (MED V-PREFIKS) ---
async function fetchCueScoreData() {
    let tID = document.getElementById('matchIDInput').value;
    // Standard Tournament ID hvis feltet er tomt
    if (!tID || tID.trim() === "") tID = "79253032"; 
    
    const proxyUrl = "https://corsproxy.io/?";
    const apiUrl = `https://api.cuescore.com/tournament/?id=${tID}`;
    
    console.log("Henter turneringsdata fra API:", tID);

    try {
        const response = await fetch(proxyUrl + apiUrl);
        const data = await response.json();
        
        // I dette API-et ligger kampene i data.matches
        const matches = data.matches || [];
        const tableID = "9158140";
        
        // Vi leter etter kampen der table_id eller table_name matcher bordet ditt
        const currentMatch = matches.find(m => m.table_id == tableID || m.table_name == tableID);

        if (currentMatch) {
            const n1 = currentMatch.player1_name || "Spiller 1";
            const n2 = currentMatch.player2_name || "Spiller 2";
            const h1 = currentMatch.player1_handicap || "0";
            const h2 = currentMatch.player2_handicap || "0";

            // Lagre til Firebase slik at stats.html oppdaterer seg
            db.ref('stats/names').set({ left: n1, right: n2 });
            db.ref('stats/handicaps').set({ left: h1, right: h2 });
            
            // Lagre ID i settings slik at stats.html vet hvilken turnering den skal følge for poeng
            db.ref('settings/cueScoreMatchID').set(tID);
            
            console.log("Suksess! Spillere funnet:", n1, "vs", n2);
        } else {
            console.warn("Ingen aktiv kamp funnet på bord " + tableID);
        }
    } catch (e) { 
        console.error("Feil ved henting fra api.cuescore.com:", e);
    }
}
    
    function updateMatchID() {
        const id = document.getElementById('matchIDInput').value;
        db.ref('settings/cueScoreMatchID').set(id);
        fetchCueScoreData(); // Hent med en gang ID endres
    }

    function toggleBallSet() {
        vibe(60);
        ballStyle = (ballStyle === 'classic') ? 'dark' : 'classic';
        db.ref('settings/ballStyle').set(ballStyle);
        renderBalls();
    }

    const grid = document.getElementById('ball-grid');
    for (let i = 1; i <= 15; i++) {
        const b = document.createElement('div');
        b.id = `btn-${i}`; b.className = 'ball-btn';
        let numLabel = document.createElement('div'); numLabel.className = 'num-label'; numLabel.innerText = i; b.appendChild(numLabel);
        let band = document.createElement('div'); band.id = `band-${i}`; band.className = 'stripe-band'; b.appendChild(band);

        b.onclick = () => {
            vibe(30);
            const ref = db.ref(`balls/${i}`);
            ref.once('value').then(snap => {
                const isSinking = snap.val() !== false;
                ref.set(!isSinking);
                if (isSinking) {
                    db.ref('activePlayer').once('value', pSnap => {
                        const p = pSnap.val();
                        if (p) db.ref(`stats/pots/${p}`).transaction(c => (c || 0) + 1);
                    });
                }
            });
        };
        grid.appendChild(b);
    }

    function renderBalls() {
        const data = window.currentActiveData || {};
        const colors = ["", "#ffcc00", "#0055aa", "#cc0000", "#ff66aa", "#663399", "#007744", "#884422", "#000"];
        for (let i = 1; i <= 15; i++) {
            const b = document.getElementById(`btn-${i}`);
            if (!b) continue;
            let shouldShow = (currentGameMode == 8) || (currentGameMode == 9 && i <= 9) || (currentGameMode == 10 && i <= 10);
            b.style.display = shouldShow ? 'flex' : 'none';
            b.classList.toggle('sunk', data[i] === false);
            if (i <= 8) { b.style.background = colors[i]; } 
            else {
                const stripeColor = colors[i - 8];
                const baseColor = (ballStyle === 'dark') ? 'black' : 'white';
                b.style.background = `linear-gradient(to bottom, ${baseColor} 0%, ${baseColor} 25%, ${stripeColor} 25%, ${stripeColor} 75%, ${baseColor} 75%, ${baseColor} 100%)`;
            }
        }
    }

    // MATCH KONTROLL - Fikset slik at klokka ikke starter med en gang
function startMatch() {
    vibe(100);
    const startTime = Date.now();
    db.ref('stats').update({ startTime: startTime });
    db.ref('activePlayer').set("");
    resetPool(currentGameMode);
    
    // FJERNET: db.ref('shotclock/cmd').set(...) - Klokka venter nå
    
    fetchCueScoreData(); 
}

    function avsluttMatch() {
        vibe(100);
        if(confirm("⚠ ADVARSEL: Slette all statistikk for denne kampen?")) {
            db.ref('stats').set({ startTime: 0 });
            db.ref('activePlayer').set(null);
            db.ref('balls').set(null);
            db.ref('shotclock/cmd').set({ action: 'stop' });
            setTimeout(() => { location.reload(); }, 500);
        }
    }

    function shotReset(player) {
        vibe(50);
        const now = Date.now();
        db.ref('activePlayer').set(player);
        db.ref(`stats/visits/${player}`).transaction(c => (c || 0) + 1);
        db.ref('shotclock/cmd').set({ action: 'reset30', ts: now });
        const timeSpent = (now - lastResetTime) / 1000;
        if (timeSpent > 1.5 && timeSpent < 150) {
            db.ref('stats/history').push({ time: timeSpent, player: player, ts: now });
        }
        lastResetTime = now;
    }

    function resetPool(max) {
        let updates = {};
        const limit = (max === 8) ? 15 : max;
        for (let i = 1; i <= 15; i++) updates[i] = (i <= limit) ? true : null;
        db.ref('balls').set(updates);
        db.ref('gameMode').set(max);
    }

    function startBreak() { vibe(60); db.ref('shotclock/cmd').set({action:'reset60', ts:Date.now()}); }
    function useExtension() { vibe(80); db.ref('activePlayer').once('value', s => { if (s.val()) db.ref(`stats/extensions/${s.val()}`).transaction(c => (c || 0) + 1); }); db.ref('shotclock/cmd').set({action:'extension', ts:Date.now()}); }
    function sendClock(cmd) { vibe(40); db.ref('shotclock/cmd').set({ action: cmd, ts: Date.now() }); }

    db.ref('activePlayer').on('value', snap => {
        const p = snap.val();
        document.getElementById('btnL').classList.toggle('active-l', p === 'left');
        document.getElementById('btnR').classList.toggle('active-r', p === 'right');
    });
    db.ref('gameMode').on('value', snap => { currentGameMode = snap.val() || 9; renderBalls(); });
    db.ref('balls').on('value', snap => { window.currentActiveData = snap.val() || {}; renderBalls(); });
    db.ref('settings/ballStyle').on('value', snap => { if(snap.val()){ ballStyle=snap.val(); renderBalls(); }});
</script>
</body>
</html>
