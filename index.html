<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KØ-PÅDD Kontrollpanel Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #000; --card: #0d0d0d; --border: #222;
            --accent: #ffcc00; --green: #00FF41; --blue: #00E5FF;
            --red: #FF0000; --ext: #00E5FF;
        }
        html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 8px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; height: 100%; display: flex; flex-direction: column; gap: 8px; }
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 12px; display: flex; flex-direction: column; }
        .pool-section { flex: 1; min-height: 0; } 
        h2 { font-size: 0.65rem; color: var(--accent); text-align: center; margin: 0 0 8px 0; text-transform: uppercase; opacity: 0.7; letter-spacing: 1px; }
        
        .name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 5px; }
        .name-input { 
            background: #111; border: 1px solid #333; color: white; padding: 8px 4px; 
            border-radius: 8px; text-align: center; font-size: 11px; width: 100%; 
            box-sizing: border-box; outline: none; 
        }
        #matchIDInput { border-bottom: 1px solid var(--accent); color: var(--accent); font-weight: bold; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 12px 5px; font-size: 13px; font-weight: 800; border-radius: 10px; border: 2px solid #333; background: #111; color: white; text-transform: uppercase; transition: all 0.2s ease; }
        .player-btn { padding: 14px 5px; font-size: 13px; border-width: 2px; }
        .foul-btn { border-color: #440000; color: #ff4444; font-size: 11px; padding: 8px; }
        
        .active-l { border-color: var(--green) !important; color: var(--green) !important; background: rgba(0, 255, 65, 0.05) !important; }
        .active-r { border-color: var(--blue) !important; color: var(--blue) !important; background: rgba(0, 229, 255, 0.05) !important; }
        .mode-btn.active-mode { border-color: var(--green) !important; color: var(--green) !important; box-shadow: 0 0 8px rgba(0, 255, 65, 0.3); }

        .ball-scroll-area { flex: 1; overflow-y: auto; margin-bottom: 8px; }
        .ball-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; justify-items: center; }
        .ball-btn { width: 52px; height: 52px; border-radius: 50%; border: 2px solid #000; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden; background: white; }
        .num-label { background: white; color: black; width: 18px; height: 18px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 10px; font-weight: 900; border: 1px solid black; z-index: 10; }
        .sunk { opacity: 0.15; filter: grayscale(1); transform: scale(0.9); }
        
        .stripe-band { position: absolute; width: 100%; height: 24px; top: 14px; z-index: 1; }
        .f-1, .b9 { background-color: #ffcc00; } .f-2, .b10 { background-color: #0055aa; }
        .f-3, .b11 { background-color: #cc0000; } .f-4, .b12 { background-color: #ff66aa; }
        .f-5, .b13 { background-color: #663399; } .f-6, .b14 { background-color: #007744; }
        .f-7, .b15 { background-color: #884422; } .f-8 { background-color: black; }
    </style>
</head>
<body>
<div class="container">
    <div class="section" style="padding: 10px 5px;">
        <h2>CueScore Table ID</h2>
        <div style="padding: 0 5px; margin-bottom: 8px;">
            <input type="text" id="matchIDInput" class="name-input" placeholder="Lim inn Match ID (f.eks. 79253032)" oninput="updateMatchID()">
        </div>
    </div>

    <div class="section pool-section">
        <h2>Pool Control</h2>
        <div class="ball-scroll-area">
            <div class="ball-grid" id="ball-grid"></div>
        </div>
        <div class="grid" style="gap: 5px; grid-template-columns: 1fr 1fr 1fr 1fr 1fr;">
            <button onclick="reputtActiveBalls()">♻️</button>
            <button onclick="toggleBallSet()">🎨</button>
            <button id="mode-9" class="mode-btn" onclick="resetPool(9)">9</button>
            <button id="mode-10" class="mode-btn" onclick="resetPool(10)">10</button>
            <button id="mode-8" class="mode-btn" onclick="resetPool(8)">8</button>
        </div>
    </div>

    <div class="section">
        <h2>Match & Stats</h2>
        <div class="grid">
            <button style="background:#1b5e20;" onclick="startMatch()">🟢 START</button>
            <button style="background:#b71c1c;" onclick="avsluttMatch()">🔴 STOPP</button>
            
            <button id="btnL" class="player-btn" onclick="shotReset('left')">◀ S1</button>
            <button id="btnR" class="player-btn" onclick="shotReset('right')">S2 ▶</button>
            
            <button class="foul-btn" onclick="addFoul('left')">⚠ FOUL S1</button>
            <button class="foul-btn" onclick="addFoul('right')">⚠ FOUL S2</button>

            <button id="toggleBtn" onclick="sendClock('toggle')">▶ START/PAUSE</button>
            <button style="border-color: var(--accent);" onclick="startBreak()">⚡ 60s BREAK</button>
            
            <button style="grid-column: span 2; color: var(--ext); border-color: var(--ext);" onclick="useExtension()">+ BRUK EXTENSION</button>
        </div>
    </div>
</div>

<script>
    // --- KONFIGURASJON ---
    const firebaseConfig = { databaseURL: "https://pool-balls-60509-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let shotChart;
    let matchStartTimestamp = 0;
    const proxyUrl = "https://api.allorigins.win/get?url=";

    // --- CUESCORE SYNC LOGIKK ---
    function syncCueScore() {
        db.ref('settings/cueScoreMatchID').once('value', snap => {
            const inputID = snap.val();
            const defaultTableID = "9158140"; 
            const activeID = (inputID && inputID.trim() !== "") ? inputID : defaultTableID;

            const apiUrl = `https://cuescore.com/api/getTableMatch:${activeID}`;
            
            fetch(proxyUrl + encodeURIComponent(apiUrl))
                .then(res => res.json())
                .then(rawData => {
                    const data = JSON.parse(rawData.contents);
                    const match = data.match || data; 

                    if (match && (match.playerA || match.player1)) {
                        const p1 = match.playerA || match.player1;
                        const p2 = match.playerB || match.player2;

                        // Vi oppdaterer KUN poengsum og brekk her. 
                        // Navn og HCP styres nå stabilt via Firebase-lytterne nederst.
                        document.getElementById('winsL').innerText = match.scoreA || match.score1 || 0;
                        document.getElementById('winsR').innerText = match.scoreB || match.score2 || 0;

                        const isBreaker = match.breaker || match.isBreaker;
                        document.getElementById('breakL').style.visibility = (isBreaker === 'A' || isBreaker === '1' ? 'visible' : 'hidden');
                        document.getElementById('breakR').style.visibility = (isBreaker === 'B' || isBreaker === '2' ? 'visible' : 'hidden');
                    }
                }).catch(e => console.log("CueScore Sync: Venter på data..."));
        });
    }

    // --- TIMER ---
    db.ref('stats/startTime').on('value', snap => { 
        matchStartTimestamp = snap.val() || 0;
        if (matchStartTimestamp > 0) syncCueScore(); 
    });

    setInterval(() => {
        const display = document.getElementById('matchDuration');
        if (matchStartTimestamp > 0) {
            const now = Date.now();
            const diff = now - matchStartTimestamp;
            const totalSeconds = Math.max(0, Math.floor(diff / 1000));
            const h = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
            const s = (totalSeconds % 60).toString().padStart(2, '0');
            display.innerText = `${h}:${m}:${s}`;
        } else {
            display.innerText = "00:00:00";
        }
    }, 1000);

    // --- STATS DATA ---
    db.ref('stats').on('value', snap => {
        const d = snap.val() || {};
        const history = d.history ? Object.values(d.history) : [];
        const pots = d.pots || {left:0, right:0};
        const visits = d.visits || {left:1, right:1};
        const fouls = d.fouls || {left:0, right:0};
        
        document.getElementById('s1Pots').innerText = pots.left || 0;
        document.getElementById('s2Pots').innerText = pots.right || 0;
        document.getElementById('vFoulL').innerText = fouls.left || 0;
        document.getElementById('vFoulR').innerText = fouls.right || 0;
        
        // Fikset NaN ved å sjekke om visits er 0
        document.getElementById('s1Eff').innerText = visits.left > 0 ? (pots.left / visits.left).toFixed(1) : "0.0";
        document.getElementById('s2Eff').innerText = visits.right > 0 ? (pots.right / visits.right).toFixed(1) : "0.0";
        
        document.getElementById('vExtL').innerText = (d.extensions?.left || 0);
        document.getElementById('vExtR').innerText = (d.extensions?.right || 0);
        document.getElementById('s1Run').innerText = (d.runouts?.left || 0);
        document.getElementById('s2Run').innerText = (d.runouts?.right || 0);

        updateVisuals(history, pots);
    });

    function updateVisuals(entries, pots) {
        if (!entries || entries.length === 0) {
            document.getElementById('totalShots').innerText = "0";
            document.getElementById('vSuccL').innerText = "0%";
            document.getElementById('vSuccR').innerText = "0%";
            return;
        }
        let s1S=0, s2S=0, s1T=0, s2T=0, s1D=[], s2D=[];
        
        entries.forEach(e => {
            if(e.player==='left'){ s1S++; s1T+=e.time; s1D.push(e.time); s2D.push(null); }
            else { s2S++; s2T+=e.time; s2D.push(e.time); s1D.push(null); }
        });

        document.getElementById('totalShots').innerText = entries.length;
        document.getElementById('vShotsL').innerText = s1S;
        document.getElementById('vShotsR').innerText = s2S;
        
        const volP = entries.length > 0 ? (s1S / entries.length) * 100 : 50;
        document.getElementById('bar-visit-s1').style.width = volP + "%";
        document.getElementById('bar-visit-s2').style.width = (100 - volP) + "%";
        document.getElementById('visitRatioText').innerText = Math.round(volP) + "/" + Math.round(100-volP);

        document.getElementById('vSuccL').innerText = s1S > 0 ? Math.round((pots.left/s1S)*100) + "%" : "0%";
        document.getElementById('vSuccR').innerText = s2S > 0 ? Math.round((pots.right/s2S)*100) + "%" : "0%";
        
        const totalT = s1T + s2T;
        const t1P = totalT > 0 ? (s1T / totalT * 100) : 50;
        document.getElementById('bar-time-s1').style.width = t1P + "%";
        document.getElementById('bar-time-s2').style.width = (100 - t1P) + "%";
        document.getElementById('timeRatioText').innerText = Math.round(t1P) + "/" + Math.round(100-t1P);

        const last5 = entries.slice(-5);
        const pIndex = last5.length > 0 ? (last5.reduce((a,b)=>a+b.time,0)/last5.length).toFixed(1) : "0.0";
        document.getElementById('pressureIndex').innerText = pIndex + "s";

        if(shotChart) {
            shotChart.data.labels = entries.map((_,i)=>i+1);
            shotChart.data.datasets[0].data = s1D;
            shotChart.data.datasets[1].data = s2D;
            shotChart.update('none');
        }
    }

    db.ref('gameMode').on('value', snap => {
        const mode = snap.val() || 9;
        document.getElementById('modeText').innerText = mode + "-Ball";
        const is8 = (mode == 8);
        document.getElementById('card-8ball-s1').classList.toggle('card-disabled', !is8);
        document.getElementById('card-8ball-s2').classList.toggle('card-disabled', !is8);
    });

    window.onload = () => {
        const ctx = document.getElementById('shotChart').getContext('2d');
        shotChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'S1', data: [], borderColor: '#00FF41', tension: 0.4, fill: false, pointRadius: 2 },
                { label: 'S2', data: [], borderColor: '#00E5FF', tension: 0.4, fill: false, pointRadius: 2 }
            ]},
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { beginAtZero: true, grid: { color: '#222' } } } }
        });
        setInterval(syncCueScore, 10000);
        syncCueScore();
    };

    // --- STABILE NAVN FRA FIREBASE ---
    db.ref('stats/names').on('value', snap => {
        const names = snap.val();
        if (names) {
            document.getElementById('nameLText').innerText = names.left || "Player 1";
            document.getElementById('nameRText').innerText = names.right || "Player 2";
        }
    });

    db.ref('stats/handicaps').on('value', snap => {
        const hc = snap.val();
        if (hc) {
            document.getElementById('hcL').innerText = "HCP: " + (hc.left || "0");
            document.getElementById('hcR').innerText = "HCP: " + (hc.right || "0");
        }
    });
</script>
</body>
</html>
