<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KØ-PÅDD Master Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #000; --card: #0d0d0d; --border: #222;
            --accent: #ffcc00; --green: #00FF41; --blue: #0055ff;
            --red: #FF0000; --ext: #00E5FF;
        }
        html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 8px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; height: 100%; display: flex; flex-direction: column; gap: 8px; }
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 12px; display: flex; flex-direction: column; }
        .pool-section { flex: 2.2; min-height: 0; }
        h2 { font-size: 0.75rem; color: var(--accent); text-align: center; margin: 0 0 8px 0; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { padding: 12px 5px; font-size: 13px; font-weight: 800; border-radius: 10px; border: 2px solid #333; background: #111; color: white; text-transform: uppercase; }
        button:active { transform: scale(0.95); background: #222; }
        .player-btn { padding: 18px 5px; font-size: 14px; border-width: 3px; line-height: 1.2; }
        .active-l, .active-r { border-color: var(--green) !important; color: var(--green) !important; background: rgba(0, 255, 65, 0.05) !important; }
        .ball-scroll-area { flex: 1; overflow-y: auto; margin-bottom: 8px; }
        .ball-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; justify-items: center; }
        .ball-btn { width: 65px; height: 65px; min-width: 65px; min-height: 65px; border-radius: 50%; border: 2px solid #000; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .num-label { background: white; color: black; width: 24px; height: 24px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 13px; font-weight: 900; border: 1px solid black; position: relative; z-index: 10; flex-shrink: 0; }
        .sunk { opacity: 0.15; filter: grayscale(1); transform: scale(0.9); }
        .striped { background: black !important; }
        .stripe-band { position: absolute; width: 100%; height: 30px; top: 17.5px; z-index: 1; }
        .f-1, .b9 { background-color: #ffcc00; } .f-2, .b10 { background-color: #0055aa; }
        .f-3, .b11 { background-color: #cc0000; } .f-4, .b12 { background-color: #ff66aa; }
        .f-5, .b13 { background-color: #663399; } .f-6, .b14 { background-color: #007744; }
        .f-7, .b15 { background-color: #884422; } .f-8 { background-color: black; }
        .btn-ext { border-color: var(--ext); color: var(--ext); padding: 15px 5px; grid-column: span 2; }
        #toggleBtn.running { border-color: var(--red); color: var(--red); }
        #toggleBtn.paused { border-color: var(--green); color: var(--green); }
        .mini-btn { padding: 8px 2px; font-size: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="section pool-section">
        <h2>Pool Control</h2>
        <div class="ball-scroll-area"><div class="ball-grid" id="ball-grid"></div></div>
        <div class="grid" style="gap: 5px;">
            <button class="mini-btn" onclick="reputtActiveBalls()">♻️ Re-Rack</button>
            <button class="mini-btn" onclick="resetPool(9)">9-Ball</button>
            <button class="mini-btn" onclick="resetPool(10)">10-Ball</button>
            <button class="mini-btn" onclick="resetPool(15)">8-Ball</button>
        </div>
    </div>
    <div class="section">
        <h2>Shotclock</h2>
        <div class="grid">
            <button class="mini-btn" onclick="hideArrows()" style="border-color: #555;">🚫 Skjul Piler</button>
            <button id="btnL" class="player-btn" onclick="shotReset('left')">◀ SPILLER 1<br><small>30s</small></button>
            <button id="btnR" class="player-btn" onclick="shotReset('right')">SPILLER 2 ▶<br><small>30s</small></button>
            <button class="btn-ext" onclick="sendClock('extension')">+ BRUK EXTENSION</button>
            <button id="toggleBtn" class="paused" onclick="sendClock('toggle')">▶ START / PAUSE</button>
            <button onclick="sendClock('reset60')">⚡ 60s BREAK</button>
            <button class="mini-btn" onclick="sendClock('minus')">-1s</button>
            <button class="mini-btn" onclick="sendClock('plus')">+1s</button>
        </div>
    </div>
</div>
<script>
    function startMatch() {
    // 1. Vis piler (nullstiller til ingen aktiv, men klar for valg)
    db.ref('activePlayer').set(""); 
    
    // 2. Start shotclock (sett til 30 sek og pause så den er klar)
    db.ref('shotclock/cmd').set({ action: 'reset30' });
    setTimeout(() => db.ref('shotclock/cmd').set({ action: 'toggle' }), 100); // Pauser den med en gang
    
    // 3. Legg ut kulene (f.eks. 9-ball som standard)
    resetPool(9);
    
    console.log("Match startet: Alt er rigget og klart.");
}

function avsluttMatch() {
    if(confirm("Er du sikker på at du vil avslutte og skjule alt?")) {
        // 1. Skjul piler
        db.ref('activePlayer').set(null);
        
        // 2. Tøm kulebordet
        db.ref('balls').set(null);
        
        // 3. Skjul/Nullstill shotclock (vi sender en kommando som tømmer displayet)
        db.ref('shotclock/cmd').set({ action: 'minus', value: 99 }); 
        
        console.log("Match avsluttet: Alt er skjult.");
    }
}
    const firebaseConfig = { databaseURL: "https://pool-balls-60509-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let lastResetTime = Date.now();

    function shotReset(player) {
        const now = Date.now();
        const timeSpent = (now - lastResetTime) / 1000;
        
        // Prøv å lagre stats, men i en egen try-catch så det ikke stopper resten av koden
        try {
            if (timeSpent > 1.5 && timeSpent < 120) { 
                db.ref('stats/history').push({ time: timeSpent, player: player }); 
            }
        } catch(e) { console.log("Stats error", e); }

        lastResetTime = now;
        db.ref('activePlayer').set(player);
        db.ref('shotclock/cmd').set({ action: 'reset30', ts: now });
    }

    function sendClock(cmd) { db.ref('shotclock/cmd').set({ action: cmd, ts: Date.now() }); }

    db.ref('activePlayer').on('value', snap => {
        const p = snap.val();
        const bL = document.getElementById('btnL');
        const bR = document.getElementById('btnR');
        if(bL) bL.classList.toggle('active-l', p === 'left');
        if(bR) bR.classList.toggle('active-r', p === 'right');
    });

    db.ref('shotclock/status').on('value', snap => {
        const status = snap.val();
        const btn = document.getElementById('toggleBtn');
        if(btn) {
            btn.textContent = (status === 'running') ? "⏸ PAUSE" : "▶ START / RESUME";
            btn.className = (status === 'running') ? "running" : "paused";
        }
    });

    const grid = document.getElementById('ball-grid');
    for (let i = 1; i <= 15; i++) {
        const b = document.createElement('div');
        b.id = `btn-${i}`; b.className = 'ball-btn';
        let num = document.createElement('div'); num.className = 'num-label'; num.innerText = i; b.appendChild(num);
        if (i > 8) { b.classList.add('striped'); let band = document.createElement('div'); band.className = `stripe-band f-${i-8}`; b.appendChild(band); } 
        else b.classList.add(`f-${i}`);
        b.onclick = () => { const ref = db.ref(`balls/${i}`); ref.once('value').then(s => ref.set(s.val() === false)); };
        grid.appendChild(b);
    }

    db.ref('balls').on('value', snap => {
        const data = snap.val() || {};
        window.currentActiveData = data;
        for (let i = 1; i <= 15; i++) {
            const btn = document.getElementById(`btn-${i}`);
            if (btn) { btn.classList.toggle('sunk', data[i] === false); btn.style.display = (data[i] === undefined) ? 'none' : 'flex'; }
        }
    });

    // Her starter funksjonene dine på utsiden:
    function resetPool(max) { 
        let updates = {}; 
        for (let i = 1; i <= 15; i++) updates[i] = (i <= max) ? true : null; 
        db.ref('balls').set(updates);
    }

    function reputtActiveBalls() { 
        if (!window.currentActiveData) return; 
        let updates = {}; 
        for (let i = 1; i <= 15; i++) {
            if (window.currentActiveData[i] !== undefined) updates[i] = true;
        }
        db.ref('balls').update(updates);
    }

    function hideArrows() {
        db.ref('activePlayer').set(null);
    }
</script>
</body>
</html>
