<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KØ-PÅDD Controller Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 500px; margin: auto; }
        .btn { padding: 20px; border-radius: 10px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; color: white; }
        .s1 { background: #00FF41; color: black; }
        .s2 { background: #00E5FF; color: black; }
        .foul-btn { background: #441111; color: #ff4444; border: 1px solid #662222; padding: 10px; margin-top: 5px; }
        .foul-btn:active { background: #ff4444; color: white; }
        .header { grid-column: span 2; padding: 10px; background: #111; border-radius: 10px; margin-bottom: 5px; }
        input { background: #222; border: 1px solid #444; color: white; padding: 8px; width: 80%; margin: 5px 0; border-radius: 5px; text-align: center; }
        .reset-section { grid-column: span 2; margin-top: 20px; border-top: 1px solid #222; padding-top: 15px; }
        .btn-stop { background: #221111; color: #ff4444; width: 100%; }
    </style>
</head>
<body>

<div class="grid">
    <div class="header">
        <h3>🎙️ MATCH CONTROL</h3>
        <input type="text" id="cueScoreID" placeholder="CueScore Match ID" value="79253032">
    </div>

    <div>
        <button class="btn s1" style="width:100%" onclick="handlePlayer('left')">◀ SPILLER 1</button>
        <button class="btn foul-btn" style="width:100%" onclick="addFoul('left')">⚠ FOUL S1</button>
    </div>

    <div>
        <button class="btn s2" style="width:100%" onclick="handlePlayer('right')">SPILLER 2 ▶</button>
        <button class="btn foul-btn" style="width:100%" onclick="addFoul('right')">⚠ FOUL S2</button>
    </div>

    <div class="reset-section">
        <button class="btn btn-stop" onclick="avsluttMatch()">AVSLUTT & NULLSTILL KAMP</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://pool-balls-60509-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function vibe(ms) { if(navigator.vibrate) navigator.vibrate(ms); }

    function handlePlayer(side) {
        vibe(50);
        const nå = Date.now();
        // Logikk for skudd-historikk (brukes til graf og tid)
        db.ref('stats/history').push({
            player: side,
            time: 20, // Her ville din shotclock-logikk hentet faktisk tid
            timestamp: nå
        });
        db.ref('activePlayer').set(side);
    }

    function addFoul(side) {
        vibe(100);
        db.ref(`stats/fouls/${side}`).transaction(current => (current || 0) + 1);
    }

    function avsluttMatch() {
        if(confirm("Vil du avslutte kampen og slette all statistikk?")) {
            db.ref('stats').set({ startTime: 0 });
            db.ref('activePlayer').set("");
            alert("Match nullstilt!");
        }
    }
</script>
</body>
</html>
