<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { 
            background: transparent; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .ball-container {
            display: flex;
            justify-content: center;
            gap: 10px; /* Litt tettere mellom selve kulene også */
            background: rgba(255, 255, 255, 0.95);
            
            /* JUSTERT PADDING: Mindre luft på sidene (12px) og topp/bunn (8px) */
            padding: 8px 12px; 
            
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            
            /* Justert min-width så den passer 9 kuler perfekt uten for mye gap */
            min-width: 520px; 
            height: 52px; 
        }

        .ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.3), 1px 2px 4px rgba(0,0,0,0.2);
            border: 1px solid rgba(0,0,0,0.1);
        }

        .num-label {
            background: white;
            color: black;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: 900;
            z-index: 5;
            border: 1.5px solid #000;
        }

        /* Beholder plassen selv om kula forsvinner */
        .sunk {
            visibility: hidden; 
        }

        .striped { background: #000 !important; overflow: hidden; }
        .stripe-band { position: absolute; width: 100%; height: 40px; z-index: 1; }

        .f-1, .b9 { background-color: #ffcc00; } 
        .f-2, .b10 { background-color: #0055aa; }
        .f-3, .b11 { background-color: #cc0000; } 
        .f-4, .b12 { background-color: #ff66aa; }
        .f-5, .b13 { background-color: #663399; } 
        .f-6, .b14 { background-color: #007744; }
        .f-7, .b15 { background-color: #884422; } 
        .f-8 { background-color: black; }
    </style>
</head>
<body>

    <div class="ball-container" id="display"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://pool-balls-60509-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('balls').on('value', snap => {
            const data = snap.val() || {};
            const display = document.getElementById('display');
            display.innerHTML = '';

            for (let i = 1; i <= 15; i++) {
                if (data[i] === undefined) continue;

                const b = document.createElement('div');
                b.className = `ball ${data[i] ? '' : 'sunk'}`;
                
                let cIdx = i > 8 ? i - 8 : i;
                
                if (i > 8) {
                    b.classList.add('striped');
                    let band = document.createElement('div');
                    band.className = `stripe-band f-${cIdx}`;
                    b.appendChild(band);
                } else {
                    b.classList.add(`f-${cIdx}`);
                }

                let num = document.createElement('div');
                num.className = 'num-label';
                num.innerText = i;
                b.appendChild(num);
                
                display.appendChild(b);
            }
        });
    </script>
</body>
</html>
