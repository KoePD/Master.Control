<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { 
            background: transparent; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .ball-container {
            display: flex;
            justify-content: center;
            gap: 10px; 
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 12px; 
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            min-width: 520px; 
            height: 52px; 
        }

        /* HOVEDCONTAINER FOR KULA */
        .ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            /* Ingen skygge her, den flyttes */
            overflow: hidden; /* Viktig for stripene */
            background-color: #fff; /* Standard hvit base for alle */
        }

        /* DETTE ER NYTT: 3D-LAGET SOM LIGGER ØVERST */
        .ball-overlay-3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            z-index: 10; /* Høyest z-index, ligger over alt */
            
            /* HER ER 3D-EFFEKTEN (Kopiert fra de hele kulene) */
            box-shadow: 
                inset -3px -3px 6px rgba(0,0,0,0.4), /* Indre skygge (dybde) */
                inset 2px 2px 5px rgba(255,255,255,0.2); /* Indre glans (lys) */
            border: 1px solid rgba(0,0,0,0.15); /* Tynn kantlinje */
            box-sizing: border-box;
        }

        .num-label {
            background: white;
            color: black;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: 900;
            z-index: 5; /* Ligger under 3D-overlayen, men over stripene */
            border: 1.5px solid #000;
        }

        /* Beholder plassen selv om kula forsvinner */
        .sunk {
            visibility: hidden; 
        }

        /* STRIPETE KULER - OPPDATERT LOGIKK */
        .striped { 
            /* Bakgrunnen må være hvit for stripete kuler */
            background-color: #000000 !important; 
        }

        .stripe-band { 
            position: absolute; 
            width: 100%; 
            /* Bred stripe (som vi snakket om sist) */
            height: 34px; 
            /* Posisjonering: (Ball høyde - Stripe høyde) / 2 */
            top: 8px; 
            z-index: 1; /* Ligger under nummeret */
        }

        /* Farger for kulene/stripene */
        .f-1, .b9 { background-color: #ffcc00; } 
        .f-2, .b10 { background-color: #0055aa; }
        .f-3, .b11 { background-color: #cc0000; } 
        .f-4, .b12 { background-color: #ff66aa; }
        .f-5, .b13 { background-color: #663399; } 
        .f-6, .b14 { background-color: #007744; }
        .f-7, .b15 { background-color: #884422; } 
        .f-8 { background-color: black; }
    </style>
</head>
<body>

    <div class="ball-container" id="display"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://pool-balls-60509-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('balls').on('value', snap => {
    const data = snap.val();
    const display = document.getElementById('display');
    
    // Hvis det ikke er noen kuler i databasen (null), skjul hele bakgrunnen
    if (!data || Object.keys(data).length === 0) {
        display.style.display = 'none'; 
        return;
    } else {
        display.style.display = 'flex'; // Vis den igjen når kuler legges ut
    }

    display.innerHTML = '';
    // ... resten av loopen din som lager kulene ...
    for (let i = 1; i <= 15; i++) {
        if (data[i] === undefined) continue;
        // (Legg til kule-logikken din her)
    }
});

            for (let i = 1; i <= 15; i++) {
                if (data[i] === undefined) continue;

                const b = document.createElement('div');
                b.className = `ball ${data[i] ? '' : 'sunk'}`;
                
                let cIdx = i > 8 ? i - 8 : i;
                
                // --- NY STRUKTUR FOR Å FÅ 3D EFFEKT ---

                // 1. Legg til det fargede båndet (kun for stripete)
                if (i > 8) {
                    b.classList.add('striped');
                    let band = document.createElement('div');
                    band.className = `stripe-band f-${cIdx}`;
                    b.appendChild(band);
                } else {
                    b.classList.add(`f-${cIdx}`);
                }

                // 2. Legg til nummeret
                let num = document.createElement('div');
                num.className = 'num-label';
                num.innerText = i;
                b.appendChild(num);

                // 3. Legg til det gjennomsiktige 3D-overlay-laget (DETTE ER NYTT)
                let overlay = document.createElement('div');
                overlay.className = 'ball-overlay-3d';
                b.appendChild(overlay);
                
                display.appendChild(b);
            }
        });
    </script>
</body>
</html>
