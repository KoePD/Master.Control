<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>KØ-PÅDD Match Insight</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #ffcc00; --s1: #00FF41; --s2: #00E5FF; --bg: #050505; --card: #111; --border: #222; }
        body { background: var(--bg); color: #eee; font-family: sans-serif; margin: 0; padding: 20px; }
        .dashboard { max-width: 1200px; margin: auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .header { grid-column: span 4; text-align: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 10px; }
        .header h1 { color: var(--gold); text-transform: uppercase; margin: 0; font-size: 1.8rem; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; text-align: center; }
        .label { font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .value { font-size: 2rem; font-weight: 800; color: #fff; }
        .s1 .value { color: var(--s1); } .s2 .value { color: var(--s2); }
        .graph-container { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; grid-column: span 4; height: 300px; }
        .comparison-bar { height: 12px; background: #222; border-radius: 6px; margin-top: 10px; overflow: hidden; display: flex; grid-column: span 4; }
        #bar-s1 { height: 100%; background: var(--s1); transition: width 0.5s; }
        .btn-reset { grid-column: span 4; background: #221111; color: #ff4444; border: 1px solid #442222; padding: 12px; border-radius: 8px; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>🎙️ Match Insight Dashboard</h1>
        <div id="matchDuration" style="font-size: 1.5rem; color: #fff; font-family: monospace; margin-top: 10px;">00:00:00</div>
    </div>

    <div class="stat-card"><div class="label">Total Shots</div><div id="totalShots" class="value">0</div></div>
    <div class="stat-card"><div class="label">Avg Pace</div><div id="avgMatchTime" class="value">0s</div></div>
    <div class="stat-card"><div class="label">Pressure</div><div id="pressureIndex" class="value">0s</div></div>
    <div class="stat-card"><div class="label">Fastest</div><div id="fastestShot" class="value">0s</div></div>

    <div class="stat-card s1"><div class="label">S1 Avg</div><div id="s1Avg" class="value">0s</div></div>
    <div class="stat-card s1"><div class="label">S1 Shots</div><div id="s1Shots" class="value">0</div></div>
    <div class="stat-card s1"><div class="label">S1 Ext</div><div id="s1Ext" class="value">0</div></div>
    <div class="stat-card s1"><div class="label">S1 Ctrl</div><div id="s1Percent" class="value">50%</div></div>

    <div class="stat-card s2"><div class="label">S2 Avg</div><div id="s2Avg" class="value">0s</div></div>
    <div class="stat-card s2"><div class="label">S2 Shots</div><div id="s2Shots" class="value">0</div></div>
    <div class="stat-card s2"><div class="label">S2 Ext</div><div id="s2Ext" class="value">0</div></div>
    <div class="stat-card s2"><div class="label">S2 Ctrl</div><div id="s2Percent" class="value">50%</div></div>

    <div class="graph-container"><canvas id="shotChart"></canvas></div>
    <div class="comparison-bar"><div id="bar-s1" style="width: 50%;"></div></div>

    <button class="btn-reset" onclick="resetAllStats()">Reset Match Data</button>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://pool-balls-60509-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let shotChart;
    let matchStartTimestamp = 0;
    let isMatchActive = false;

    // 1. Starttid-lytter
    db.ref('stats/startTime').on('value', snap => {
        matchStartTimestamp = snap.val();
        console.log("Starttid mottatt:", matchStartTimestamp);
    });

    // 2. Status-lytter
    db.ref('shotclock/status').on('value', snap => {
        const status = snap.val();
        isMatchActive = (status !== 'hidden' && status !== null);
    });

    // 3. Timer-loop (Tvinger oppdatering hver sekund)
    setInterval(() => {
        const display = document.getElementById('matchDuration');
        if (isMatchActive && matchStartTimestamp > 0) {
            const seconds = Math.floor((Date.now() - matchStartTimestamp) / 1000);
            if (seconds >= 0) {
                const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
                const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                display.innerText = `${h}:${m}:${s}`;
            }
        } else if (!isMatchActive) {
            // Beholder tiden den stoppet på, eller nullstiller hvis ingen starttid finnes
            if (!matchStartTimestamp) display.innerText = "00:00:00";
        }
    }, 1000);

    // --- Resten av din eksisterende graf og stats-logikk her ---
    function initChart() {
        const ctx = document.getElementById('shotChart').getContext('2d');
        shotChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'S1', data: [], borderColor: '#00FF41', tension: 0.3, fill: false, spanGaps: true },
                { label: 'S2', data: [], borderColor: '#00E5FF', tension: 0.3, fill: false, spanGaps: true }
            ]},
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true }, x: { display: false } } }
        });
    }

    db.ref('stats/history').on('value', snap => {
        const history = snap.val() ? Object.values(snap.val()) : [];
        updateUI(history);
    });

    db.ref('stats/extensions').on('value', snap => {
        const ext = snap.val() || { left: 0, right: 0 };
        document.getElementById('s1Ext').innerText = ext.left || 0;
        document.getElementById('s2Ext').innerText = ext.right || 0;
    });

    function updateUI(entries) {
        if (!entries || entries.length === 0) return;
        let s1T = 0, s1C = 0, s2T = 0, s2C = 0, fastest = 999;
        let s1Data = [], s2Data = [], labels = [];

        entries.forEach((e, i) => {
            if (e.time < fastest) fastest = e.time;
            labels.push(i + 1);
            if (e.player === 'left') { s1T += e.time; s1C++; s1Data.push(e.time); s2Data.push(null); }
            else { s2T += e.time; s2C++; s2Data.push(e.time); s1Data.push(null); }
        });

        document.getElementById('totalShots').innerText = entries.length;
        document.getElementById('avgMatchTime').innerText = ((s1T + s2T) / entries.length).toFixed(1) + "s";
        document.getElementById('fastestShot').innerText = (fastest === 999 ? 0 : fastest).toFixed(1) + "s";
        document.getElementById('s1Avg').innerText = (s1C > 0 ? s1T/s1C : 0).toFixed(1) + "s";
        document.getElementById('s1Shots').innerText = s1C;
        document.getElementById('s2Avg').innerText = (s2C > 0 ? s2T/s2C : 0).toFixed(1) + "s";
        document.getElementById('s2Shots').innerText = s2C;

        const s1P = entries.length > 0 ? ((s1C / entries.length) * 100).toFixed(0) : 50;
        document.getElementById('s1Percent').innerText = s1P + "%";
        document.getElementById('s2Percent').innerText = (100 - s1P) + "%";
        document.getElementById('bar-s1').style.width = s1P + "%";

        if (shotChart) {
            shotChart.data.labels = labels;
            shotChart.data.datasets[0].data = s1Data;
            shotChart.data.datasets[1].data = s2Data;
            shotChart.update('none');
        }
    }

    function resetAllStats() {
        if(confirm("Slette all match-data?")) {
            db.ref('stats').remove();
            matchStartTimestamp = 0;
            document.getElementById('matchDuration').innerText = "00:00:00";
        }
    }
    window.onload = initChart;
</script>
</body>
</html>
